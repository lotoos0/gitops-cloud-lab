name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/demo-api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/demo-api/requirements.txt

      - name: Run tests
        working-directory: apps/demo-api
        run: python -m pytest tests/ -v
