name: GitOps update

on:
  workflow_run:
    workflows: ["Build and push image"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: demo-api-gitops-update-main
  cancel-in-progress: true

jobs:
  update-values:
    name: Update image tag in dev values
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "value=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image.tag in dev values
        run: yq e '.image.tag = "${{ steps.tag.outputs.value }}"' -i gitops/envs/dev/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/envs/dev/values.yaml
          git diff --staged --quiet || git commit -m "chore: update demo-api image tag to ${{ steps.tag.outputs.value }}"
          git push
