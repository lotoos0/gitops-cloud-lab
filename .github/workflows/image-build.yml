name: Build and push image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

jobs:
  build-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: tag
        run: echo "value=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/demo-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/demo-api:${{ steps.tag.outputs.value }}
          build-args: |
            GIT_COMMIT=${{ github.event.workflow_run.head_sha }}
            APP_VERSION=${{ steps.tag.outputs.value }}
            APP_ENV=dev
