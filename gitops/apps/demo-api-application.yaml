apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lotoos0/gitops-cloud-lab.git
    targetRevision: main
    path: deploy/helm/demo-api
    helm:
      valueFiles:
        - ../../../gitops/envs/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
